<!DOCTYPE html>
<html>
<head>
<style>
.rectangle{
width:100px;
height:50px;
background-color:red;
animation:sizeAnimation 2s infinite
alternate;
}
@keyframes sizeAnimation{
0%{width:100px;height:50px;}
50%{width:200px;height:100px;}
100%{width:100px;height:50px;}
}
</style>
</head>
<body>
<div class="rectangle"></div>
</body>
</html>
