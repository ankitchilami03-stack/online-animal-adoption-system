<html>
<head>
<style>
h1{
color:red;
text-align:center;
}
div{
position:relative;
animation:jtp 7s infinite;
}
@keyframes jtp{
0%{
top:100px;
width:50px;
font-size:20px;
transform:tanslate(0px)scale(1.4)rotate(80deg);}
25%{
top:100px;
width:50px;
background-coloe:red;
font-size:30px;
transform:tanslate(100px)scale(1.3)rotate(60deg);}
50%{
top:100px;
width:50px;
background-coloe:yellow;
font-size:40px;
transform:tanslate(200px)scale(1.2)rotate(40deg);}
75%{
top:100px;
width:50px;
background-coloe:red;
font-size:30px;
transform:tanslate(300px)scale(1.1)rotate(20deg);}
100%{
top:100px;
width:50px;
background-coloe:red;
font-size:30px;
transform:tanslate(400px)scale(1.0)rotate(0deg);}
}
</style>
</head>
<body>
<div>
<h1>multimedia and animation</h1>
</div>
</body>
</html>
