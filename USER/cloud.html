<html>
<head>
<titel>Buncing cloud</titel>
<style>
#maincloud
{
background-color:red;
border-radius:4px;
padding:10px;
width:600px;
height:300px;
}
.cloud
{
position:relative;
}
#bigcloud{
animation:bobble 2s infinite;
margin-left:100px;
margin-top:15px;
}
@keyframes bobble{
0%{
transform:translate3d(50px,40px,0px);
animation-timing-function:ease-in;
}
50%{
transform:translate3d(50px,60px,0px);
animation-timing-function:ease-out;
}
100%{
transform:translate3d(50px,40px,0px);
}
}
</style>
</head>
<body>
<div id="maincloud">
<img id="bigcloud" class="cloud" width="200" src="https:/www.kirupa.com/images/bigCloud.png" height="100">
</div>
</body>
</html>
